<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>バイタルモニター V4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .monitor { background: #111; border: 4px solid #444; border-radius: 10px; width: 100%; max-width: 500px; padding: 20px; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); position: relative; }
        .header { border-bottom: 2px solid #0f0; margin-bottom: 10px; padding-bottom: 5px; display: flex; justify-content: space-between; font-size: 11px; }
        
        /* 心電図エリア */
        .ecg-container { height: 80px; background: #050505; border: 1px solid #222; margin-bottom: 10px; overflow: hidden; position: relative; }
        #ecg-canvas { width: 100%; height: 100%; }

        .vital-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .vital-box { background: #050505; border: 1px solid #333; padding: 10px; border-radius: 5px; position: relative; }
        .label { font-size: 12px; color: #0f0; font-weight: bold; }
        .num-display { font-size: 38px; font-weight: bold; color: #0f0; }

        /* 酸素投与セクション */
        .ox-panel { background: #001a00; border: 1px solid #0f0; padding: 10px; border-radius: 5px; margin-bottom: 10px; transition: 0.3s; }
        .ox-active { background: #004400 !important; box-shadow: inset 0 0 15px #0f0; }
        .ox-controls { display: flex; align-items: center; justify-content: space-around; margin-top: 5px; }
        .ox-val { font-size: 24px; color: #fff; font-weight: bold; }
        #ox-msg { font-size: 10px; color: #0f0; text-align: center; height: 12px; margin-top: 5px; font-weight: bold; }

        /* 状態・クイズ表示 */
        #status-display { background: #001a00; border: 2px solid #0f0; padding: 10px; font-size: 16px; text-align: center; font-weight: bold; min-height: 40px; }
        .status-danger { border-color: #f00 !important; color: #f00 !important; background: #200 !important; animation: blink 0.5s infinite; }
        
        #quiz-box { display: none; margin-top: 10px; padding: 10px; background: #330; border: 1px solid #ff0; color: #ff0; text-align: center; border-radius: 5px; }
        .quiz-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }

        .btn { padding: 10px; font-weight: bold; cursor: pointer; border: 1px solid #0f0; background: #003300; color: #0f0; font-family: inherit; border-radius: 5px; outline: none; }
        .btn:active { background: #0f0; color: #000; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="monitor">
    <div class="header"><span>SUKUBA EMS - V4 SYNC MODE</span><span id="clock">00:00:00</span></div>
    
    <div class="ecg-container"><canvas id="ecg-canvas"></canvas></div>

    <div class="vital-row">
        <div class="vital-box"><div class="label">HR (心拍数)</div><span id="hr-val" class="num-display">72</span></div>
        <div class="vital-box"><div class="label">BP (血圧)</div><span id="bp-val" class="num-display">120</span></div>
    </div>

    <div id="ox-area" class="ox-panel">
        <div class="label">O2 (酸素流量設定)</div>
        <div class="ox-controls">
            <button class="btn" onclick="changeO2(-1)">▼</button>
            <span class="ox-val"><span id="o2-val">0</span> L/min</span>
            <button class="btn" onclick="changeO2(1)">▲</button>
            <button class="btn" style="background:#27ae60; border-color:#fff;" onclick="applyO2()">投与開始</button>
        </div>
        <div id="ox-msg"></div>
    </div>

    <div id="status-display">MONITORING...</div>

    <div id="quiz-box">
        <div style="font-size:14px; margin-bottom:5px;">🚨 患者の容体が急変！どうする？</div>
        <div class="quiz-btns">
            <button class="btn" onclick="answer('call')">応援要請</button>
            <button class="btn" onclick="answer('bag')">BVM換気</button>
            <button class="btn" onclick="answer('aed')">AED準備</button>
            <button class="btn" onclick="answer('pos')">体位管理</button>
        </div>
    </div>

    <button class="btn" onclick="toggleSound()" id="sound-btn" style="width:100%; margin-top:10px;">🔊 モニター音: OFF</button>
</div>

<script>
    let hr = 72, bp = 120, o2 = 0, soundEnabled = false, audioCtx = null;
    let isEmergency = false, emergencyType = "", isOxPlaying = false;

    // 数値更新 (0.89秒)
    setInterval(() => {
        if (!isEmergency) {
            hr += (Math.random() > 0.5 ? 1 : -1);
            bp += (Math.random() > 0.5 ? 1 : -1);
            if (Math.random() < 0.03) triggerEmergency(); // 3%で急変
        } else {
            hr += (emergencyType === "high" ? 3 : -3);
            bp -= 2;
        }
        updateDisplay();
    }, 890);

    function updateDisplay() {
        document.getElementById('hr-val').innerText = Math.max(0, hr);
        document.getElementById('bp-val').innerText = Math.max(0, bp);
        const display = document.getElementById('status-display');
        if (hr < 40 || hr > 160 || bp < 60) {
            display.innerText = "【危篤】心停止の危険！";
            display.classList.add('status-danger');
        } else if (isEmergency) {
            display.innerText = "⚠️ 異常：適切な処置を選択せよ";
            display.classList.add('status-danger');
        } else {
            display.innerText = "容体安定";
            display.classList.remove('status-danger');
        }
    }

    // 酸素投与の演出
    function changeO2(val) { o2 = Math.max(0, Math.min(15, o2 + val)); document.getElementById('o2-val').innerText = o2; }
    function applyO2() {
        const area = document.getElementById('ox-area');
        const msg = document.getElementById('ox-msg');
        if (o2 === 0) {
            msg.innerText = "流量を設定してください";
            return;
        }
        isOxPlaying = true;
        area.classList.add('ox-active');
        msg.innerText = "💨 酸素 " + o2 + "L 投与中...";
        
        setTimeout(() => {
            area.classList.remove('ox-active');
            msg.innerText = "投与完了";
            if (isEmergency && o2 >= 6) {
                hr = (hr > 100) ? hr - 15 : hr + 15;
                bp += 10;
            }
            isOxPlaying = false;
        }, 3000);
    }

    function triggerEmergency() {
        isEmergency = true;
        emergencyType = Math.random() > 0.5 ? "high" : "low";
        document.getElementById('quiz-box').style.display = "block";
    }

    function answer(choice) {
        const quiz = document.getElementById('quiz-box');
        if ((emergencyType === "high" && choice === "call") || (emergencyType === "low" && choice === "bag")) {
            alert("適切な判断です。容体が安定に向かいます。");
            isEmergency = false; hr = 72; bp = 120;
            quiz.style.display = "none";
        } else {
            alert("処置が不適切です！悪化しています！");
            hr = (emergencyType === "high" ? hr + 25 : hr - 25);
            bp -= 20;
        }
    }

    // --- 心拍連動波形 ---
    const canvas = document.getElementById('ecg-canvas');
    const ctx = canvas.getContext('2d');
    let x = 0;
    let lastTime = 0;

    function draw(time) {
        // 心拍数(hr)に応じて描画速度を調整
        let speed = (hr / 60) * 4; 
        
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fillRect(x, 0, 10, canvas.height); // 残像消去

        ctx.strokeStyle = "#0f0";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, 40);

        // 心拍に合わせて一定間隔で波を作る
        let beatInterval = 60000 / hr; // 1拍のミリ秒
        let phase = time % beatInterval;
        let y = 40;

        if (phase < 50) { // P波
            y = 35;
        } else if (phase > 60 && phase < 80) { // QRS波（メインの跳ね）
            y = 10;
        } else if (phase >= 80 && phase < 110) {
            y = 70;
        } else if (phase > 200 && phase < 250) { // T波
            y = 30;
        }

        x += speed;
        if (x > canvas.width) x = 0;

        ctx.lineTo(x, y);
        ctx.stroke();
        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    function toggleSound() {
        if (!audioCtx) audioCtx = new AudioContext();
        soundEnabled = !soundEnabled;
        document.getElementById('sound-btn').innerText = soundEnabled ? "🔇 モニター音: ON" : "🔊 モニター音: OFF";
        if (soundEnabled) beat();
    }
    function beat() {
        if (!soundEnabled) return;
        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        osc.frequency.value = (hr > 150 || hr < 40) ? 1300 : 1000;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        setTimeout(beat, (60000 / hr));
    }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
